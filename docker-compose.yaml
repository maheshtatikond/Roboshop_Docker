services:
  mongodb:
    build: ./mongodb # move to mongodb directory and execute docker build
    image: mahesh6419/mongodb:1.0.0 # docker build -t mahesh6419/mongodb:1.0.0 .
    container_name: mongodb

  catalogue:
    build: ./catalogue
    image: mahesh6419/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb

  user:
    build: ./user
    image: mahesh6419/user:1.0.0
    container_name: user
    depends_on:
      - redis

  redis:
    image: redis:7.0
    container_name: redis

  cart:
    build: ./cart
    image: mahesh6419/cart:1.0.0
    container_name: cart
    depends_on:
      - redis
     


  frontend:
    build: ./frontend
    image: mahesh6419/frontend:1.0.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart

  
 
networks:
  default:
    driver: bridge
    name: Roboshop_network
    external: false #if true it will create a network manually and use it, if false it will create a network with the name of the project
      
